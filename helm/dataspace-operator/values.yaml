## Image built by the GitHub Actions workflow and pushed to GHCR.
image:
  # Set to your GHCR image, e.g. ghcr.io/<owner>/<repo>
  repository: ghcr.io/OWNER/dataspaceoperator
  tag: "main"
  pullPolicy: IfNotPresent

# For a private GHCR package, create a docker-registry secret and reference it here.
imagePullSecrets: []
# - name: ghcr-pull

replicaCount: 1   # SQLite is single-writer — keep at 1 (scale out requires an external DB)

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

## The central issuer identity. The private seed is a SECRET.
issuer:
  did: "did:web:issuer.localhost"
  # Base64 Ed25519 seed. Leave empty to auto-generate (unstable DID — dev only).
  # Provided to the app as env Issuer__PrivateSeedBase64 via the Secret below.
  privateSeedBase64: ""
  # Or reference an existing secret instead of managing it here:
  existingSecret: ""            # secret name
  existingSecretSeedKey: "issuer-seed"

## XAF security URL signing key (sensitive). Change for production.
security:
  urlSigningKey: "CHANGE-ME-URL-SIGNING-KEY"

## Database. Default: SQLite file on a PVC (works with replicaCount=1).
database:
  # Full EF Core connection string. {dataDir} is replaced with the mounted data path.
  connectionString: "EFCoreProvider=SQLite;Data Source={dataDir}/DataspaceOperator.Xaf"
  # Run "--updateDatabase" in an init container before serving.
  runMigrationsInitContainer: true

persistence:
  enabled: true
  size: 1Gi
  storageClass: ""
  mountPath: /app/data

env:
  ASPNETCORE_ENVIRONMENT: Production
# extraEnv: []   # additional raw env vars

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: operator.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    memory: 1Gi

podSecurityContext:
  fsGroup: 1654         # aspnet image non-root group; ensures the PVC is writable
securityContext: {}

nodeSelector: {}
tolerations: []
affinity: {}

## ---------------------------------------------------------------------------
## HashiCorp Vault (optional). Disabled by default.
## The app reads the issuer seed directly from Vault (KV v2) via the built-in
## HashiCorpVaultSecretStore when vault.app.enabled=true.
## ---------------------------------------------------------------------------
vault:
  # Deploy the HashiCorp Vault subchart (dev mode is insecure — evaluation only).
  # You can also point vault.app at any existing/external Vault without deploying this subchart.
  enabled: false
  server:
    dev:
      enabled: true
  # Native KV integration: the app reads the issuer seed from Vault KV at startup.
  app:
    enabled: false
    address: "http://vault:8200"
    # Static token auth (dev). For production leave empty and use kubernetesRole.
    token: ""
    # Vault Kubernetes auth role bound to this release's ServiceAccount (used when token is empty).
    kubernetesRole: ""
    kubernetesAuthMount: "kubernetes"
    kvMount: "secret"
    secretPath: "dataspace-operator/issuer"
    seedField: "seed"
  # Vault Transit signing: the issuer PRIVATE KEY never leaves Vault (strongest option).
  transit:
    enabled: false
    address: "http://vault:8200"
    token: ""
    kubernetesRole: ""
    kubernetesAuthMount: "kubernetes"
    mount: "transit"
    keyName: "dataspace-issuer"
