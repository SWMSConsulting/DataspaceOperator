apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dataspace-operator.fullname" . }}
  labels:
    {{- include "dataspace-operator.labels" . | nindent 4 }}
data:
  ASPNETCORE_ENVIRONMENT: {{ .Values.env.ASPNETCORE_ENVIRONMENT | quote }}
  ASPNETCORE_URLS: "http://+:8080"
  Issuer__Did: {{ .Values.issuer.did | quote }}
  # false omits credentialStatus from issued credentials (no revocation), avoiding the
  # IdentityHub-expects-JWT vs EDC-expects-JSON conflict on the status-list URL.
  # NOTE: `default` treats boolean false as empty, so test for nil explicitly.
  Issuer__IncludeCredentialStatus: {{ if kindIs "invalid" .Values.issuer.includeCredentialStatus }}"true"{{ else }}{{ .Values.issuer.includeCredentialStatus | quote }}{{ end }}
  ConnectionStrings__ConnectionString: {{ include "dataspace-operator.connectionString" . | quote }}
