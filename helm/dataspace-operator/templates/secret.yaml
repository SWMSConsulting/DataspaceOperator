apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dataspace-operator.fullname" . }}
  labels:
    {{- include "dataspace-operator.labels" . | nindent 4 }}
type: Opaque
stringData:
  # XAF security URL signing key
  url-signing-key: {{ .Values.security.urlSigningKey | quote }}
  {{- if not .Values.admin.existingSecret }}
  # initial admin password (empty = do not create an admin)
  admin-password: {{ .Values.admin.password | quote }}
  {{- end }}
  {{- if not .Values.issuer.existingSecret }}
  # issuer signing-key seed (base64 Ed25519); consumed as env Issuer__PrivateSeedBase64
  {{ .Values.issuer.existingSecretSeedKey }}: {{ .Values.issuer.privateSeedBase64 | quote }}
  {{- end }}
