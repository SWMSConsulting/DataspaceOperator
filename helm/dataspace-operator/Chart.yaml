apiVersion: v2
name: dataspace-operator
description: >-
  Central dataspace operator service (issuer / BDRS directory / DCP issuance / status list),
  packaged as a DevExpress XAF Blazor application. Optionally deploys HashiCorp Vault.
type: application
version: 0.1.0
appVersion: "0.1.0"

dependencies:
  # Optional: HashiCorp Vault. Disabled by default.
  # NOTE: the application currently reads the issuer seed from configuration/env (ISecretStore =
  # ConfigurationSecretStore). A native Vault-backed ISecretStore is NOT implemented yet, so Vault
  # here is provided as opt-in infrastructure + Agent Injector scaffolding, not a wired default.
  - name: vault
    version: "0.28.1"
    repository: "https://helm.releases.hashicorp.com"
    condition: vault.enabled
