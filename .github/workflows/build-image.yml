name: build-image

# Builds the container image and pushes it to GitHub Container Registry (ghcr.io).
# Prerequisite: create a repository secret named DEVEXPRESS_LICENSE with your personal
# DevExpress .NET license key (Settings -> Secrets and variables -> Actions).

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    # The DEVEXPRESS_LICENSE secret lives in the "secret" environment, so the job must reference it —
    # otherwise ${{ secrets.DEVEXPRESS_LICENSE }} resolves to empty and the build is watermarked eval.
    environment: secret
    steps:
      - uses: actions/checkout@v4

      # Write the DevExpress license into a file in the build context. The secret is passed via the
      # step environment (not string-interpolated into the command line), so the license content —
      # which contains $, backticks and parentheses — is written byte-for-byte without shell mangling.
      - name: Write DevExpress license file
        env:
          DEVEXPRESS_LICENSE: ${{ secrets.DEVEXPRESS_LICENSE }}
        run: printf '%s' "$DEVEXPRESS_LICENSE" > DevExpress_License.txt

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
