# =============================================================================
# HashiCorp Vault (dev-mode) for participant BOB  -- namespace windx-bob
# SHARED by bob-ih (IdentityHub) AND bob-edc (connector).
# Reachable in-cluster at:  http://bob-vault:8200
# Apply with:  kubectl -n windx-bob apply -f vault-bob.yaml
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bob-vault
  namespace: windx-bob
  labels: { app: bob-vault }
spec:
  replicas: 1
  selector:
    matchLabels: { app: bob-vault }
  template:
    metadata:
      labels: { app: bob-vault }
    spec:
      containers:
        - name: vault
          image: hashicorp/vault:1.17
          args: ["server", "-dev", "-dev-listen-address=0.0.0.0:8200"]
          env:
            - name: VAULT_DEV_ROOT_TOKEN_ID
              value: "root"
            - name: VAULT_DEV_LISTEN_ADDRESS
              value: "0.0.0.0:8200"
            - name: VAULT_ADDR
              value: "http://127.0.0.1:8200"
          ports:
            - { containerPort: 8200, name: http }
          securityContext:
            capabilities:
              add: ["IPC_LOCK"]
          readinessProbe:
            httpGet: { path: /v1/sys/health, port: 8200 }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: bob-vault
  namespace: windx-bob
spec:
  selector: { app: bob-vault }
  ports:
    - { name: http, port: 8200, targetPort: 8200 }
