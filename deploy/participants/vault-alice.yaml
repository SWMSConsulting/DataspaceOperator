# =============================================================================
# HashiCorp Vault (dev-mode) for participant ALICE  -- namespace windx-alice
# SHARED by alice-ih (IdentityHub) AND alice-edc (connector).
# Dev-mode auto-unseals with a static root token "root" (DEMO ONLY).
# Reachable in-cluster at:  http://alice-vault:8200   (matches vault.hashicorp.url)
# Apply with:  kubectl -n windx-alice apply -f vault-alice.yaml
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alice-vault
  namespace: windx-alice
  labels: { app: alice-vault }
spec:
  replicas: 1
  selector:
    matchLabels: { app: alice-vault }
  template:
    metadata:
      labels: { app: alice-vault }
    spec:
      containers:
        - name: vault
          image: hashicorp/vault:1.17
          # dev mode: in-memory storage, auto-unseal, KV v2 mounted at secret/
          args: ["server", "-dev", "-dev-listen-address=0.0.0.0:8200"]
          env:
            - name: VAULT_DEV_ROOT_TOKEN_ID   # == vault.hashicorp.token in both charts
              value: "root"
            - name: VAULT_DEV_LISTEN_ADDRESS
              value: "0.0.0.0:8200"
            - name: VAULT_ADDR
              value: "http://127.0.0.1:8200"
          ports:
            - { containerPort: 8200, name: http }
          securityContext:
            capabilities:
              add: ["IPC_LOCK"]
          readinessProbe:
            httpGet: { path: /v1/sys/health, port: 8200 }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: alice-vault
  namespace: windx-alice
spec:
  selector: { app: alice-vault }
  ports:
    - { name: http, port: 8200, targetPort: 8200 }
